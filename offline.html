<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>CashPhone — אין חיבור</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Exo+2:wght@800;900&family=Heebo:wght@400;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:'Heebo',sans-serif;
  background:#0d0d14;
  color:#fff;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:24px;
  direction:rtl;
}
.container{text-align:center;max-width:340px;}
.logo{
  font-family:'Exo 2',sans-serif;
  font-size:26px;
  font-weight:900;
  letter-spacing:3px;
  color:#fff;
  margin-bottom:32px;
}
.logo span{color:#39e600;}
.icon{
  font-size:72px;
  margin-bottom:20px;
  display:block;
  animation:pulse 2s ease-in-out infinite;
}
@keyframes pulse{
  0%,100%{opacity:1;transform:scale(1);}
  50%{opacity:.6;transform:scale(.95);}
}
h1{
  font-family:'Exo 2',sans-serif;
  font-size:22px;
  font-weight:800;
  margin-bottom:10px;
  color:#fff;
}
p{
  font-size:14px;
  color:#7070a0;
  line-height:1.7;
  margin-bottom:28px;
}
.retry-btn{
  background:linear-gradient(135deg,#39e600,#2ab800);
  color:#000;
  border:none;
  border-radius:12px;
  padding:14px 32px;
  font-size:15px;
  font-weight:700;
  cursor:pointer;
  font-family:inherit;
  width:100%;
  transition:transform .2s,box-shadow .2s;
  box-shadow:0 4px 16px rgba(57,230,0,0.3);
}
.retry-btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(57,230,0,0.4);}
.tips{
  margin-top:28px;
  background:#141420;
  border:1px solid #2a2a40;
  border-radius:14px;
  padding:16px;
  text-align:right;
}
.tips p{font-size:12px;color:#5050a0;margin-bottom:4px;}
.tip{
  display:flex;
  align-items:center;
  gap:8px;
  padding:6px 0;
  font-size:13px;
  color:#9090c0;
  border-bottom:1px solid #1e1e30;
}
.tip:last-child{border:none;}
.tip-icon{font-size:16px;flex-shrink:0;}
</style>
</head>
<body>
<div class="container">
  <div class="logo">CASH<span>PHONE</span></div>
  <span class="icon">📶</span>
  <h1>אין חיבור לאינטרנט</h1>
  <p>CashPhone צריך חיבור כדי לטעון הזמנות ולאמת תשלומים.<br/>בדוק את החיבור ונסה שוב.</p>
  <button class="retry-btn" onclick="location.reload()">נסה שוב</button>
  <div class="tips">
    <p>מה לבדוק:</p>
    <div class="tip"><span class="tip-icon">📡</span><span>Wi-Fi או נתונים סלולריים דולקים?</span></div>
    <div class="tip"><span class="tip-icon">✈️</span><span>מצב טיסה כבוי?</span></div>
    <div class="tip"><span class="tip-icon">🔄</span><span>נסה לרענן את הדף</span></div>
  </div>
</div>
</body>
</html>
